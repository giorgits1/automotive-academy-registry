services:
  - type: web
    name: automotive-academy-registry
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: DB_PATH
        value: /var/data/academy.db
    disk:
      name: academy-data
      mountPath: /var/data
      sizeGB: 1
